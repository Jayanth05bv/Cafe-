<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Cafe — Full Stack Status</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e8e8e8;
    }
    h1 {
      text-align: center;
      margin-bottom: 2rem;
      font-weight: 600;
      color: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .card h2 { margin-top: 0; font-size: 1.1rem; color: #a5d6ff; }
    .card .status { font-size: 0.95rem; margin: 0.5rem 0; }
    .card .status.ok { color: #6ee7b7; }
    .card .status.fail { color: #fca5a5; }
    .card .status.pending { color: #fcd34d; }
    .card a {
      display: inline-block;
      margin-top: 0.75rem;
      color: #93c5fd;
      text-decoration: none;
    }
    .card a:hover { text-decoration: underline; }
    .db-info { font-family: monospace; font-size: 0.85rem; color: #c4b5fd; margin-top: 0.5rem; }
    #output {
      max-width: 1000px;
      margin: 2rem auto 0;
      padding: 1rem;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>Digital Cafe — Full Stack Status</h1>
  <div class="grid">
    <div class="card">
      <h2>Frontend (React)</h2>
      <p class="status pending" id="frontend-status">Checking…</p>
      <a href="http://localhost:3000" target="_blank">Open App → http://localhost:3000</a>
    </div>
    <div class="card">
      <h2>Backend (API)</h2>
      <p class="status pending" id="backend-status">Checking…</p>
      <a href="http://localhost:8081/api/health/db" target="_blank">Health → http://localhost:8081</a>
    </div>
    <div class="card">
      <h2>Database (MySQL)</h2>
      <p class="status pending" id="db-status">Checking…</p>
      <p class="db-info">cafedb @ localhost:3306</p>
      <a href="http://localhost:3000" target="_blank">Use app to view data</a>
    </div>
  </div>
  <div id="output"></div>

  <script>
    const log = (msg) => {
      const el = document.getElementById('output');
      el.textContent = (el.textContent ? el.textContent + '\n' : '') + msg;
      el.scrollTop = el.scrollHeight;
    };

    // Backend + DB status via /api/health/db (same origin)
    fetch('/api/health/db')
      .then(r => r.json())
      .then(data => {
        document.getElementById('backend-status').textContent = 'Backend is up';
        document.getElementById('backend-status').className = 'status ok';
        document.getElementById('db-status').textContent = data.database === 'connected'
          ? 'Connected (roles: ' + (data.rolesCount ?? '—') + ')'
          : 'Unknown';
        document.getElementById('db-status').className = 'status ok';
        log('Backend & DB: OK — rolesCount=' + (data.rolesCount ?? '—'));
      })
      .catch(() => {
        document.getElementById('backend-status').textContent = 'Not reachable';
        document.getElementById('backend-status').className = 'status fail';
        document.getElementById('db-status').textContent = 'Unknown (backend down)';
        document.getElementById('db-status').className = 'status fail';
        log('Backend/DB check failed (is backend running on 8081?)');
      });

    // Frontend status (cross-origin)
    fetch('http://localhost:3000', { mode: 'no-cors' })
      .then(() => {
        document.getElementById('frontend-status').textContent = 'Running';
        document.getElementById('frontend-status').className = 'status ok';
        log('Frontend: OK (localhost:3000)');
      })
      .catch(() => {
        fetch('http://localhost:3000', { method: 'HEAD' })
          .then(() => {
            document.getElementById('frontend-status').textContent = 'Running';
            document.getElementById('frontend-status').className = 'status ok';
            log('Frontend: OK');
          })
          .catch(() => {
            document.getElementById('frontend-status').textContent = 'Not reachable';
            document.getElementById('frontend-status').className = 'status fail';
            log('Frontend not reachable (is npm start running?)');
          });
      });
  </script>
</body>
</html>
