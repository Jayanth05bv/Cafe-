# Default database: H2 (file-based, no MySQL needed). Use profile "mysql" only if you have MySQL running.
spring:
  application:
    name: digital-cafe-backend
  config:
    import: optional:file:./.env.properties

  datasource:
    # Default: H2 file-based DB (no MySQL required). Data persists in ./cafedb.mv.db
    # H2 Console: use JDBC URL  jdbc:h2:file:./cafedb  (not mem:cafedb). User: sa, Password: (empty)
    url: jdbc:h2:file:./cafedb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      # update = keep schema and data across restarts (no create-drop)
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  sql:
    init:
      # never = do not re-run data.sql (avoids duplicate rows with persistent DB)
      mode: never

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-please}
    expiration-ms: 86400000
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@digitalcafe.local}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  seed-demo: ${APP_SEED_DEMO:false}
  razorpay:
    enabled: ${RAZORPAY_ENABLED:false}
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    currency: ${RAZORPAY_CURRENCY:INR}
    checkout-name: ${RAZORPAY_CHECKOUT_NAME:Digital Cafe}

logging:
  level:
    org.springframework.security: INFO
    com.cafe: DEBUG
